<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./style.css" rel="stylesheet" />
    <title>Growth Page</title>
  </head>
  <body class="font-regular">
    <header class="relative max-w-[1400px] m-auto">
      <nav
        id="main-nav"
        class="group/main p-6 flex justify-between items-center">
        <div>
          <a href="/index.html" class="cursor-pointer">
            <img
              class="group-[.clicked]/main:hidden"
              src="./assets/Logo.svg"
              alt=""/>
          </a>
        </div>
        <div
          class="max-md:absolute max-md:w-full max-md:h-svh left-0 top-0 text-center">
          <ul
            class="hidden z-3 bg-white font-medium md:flex md:flex-row group-[.clicked]/main:flex md:items-center flex-col group-[.clicked]/main:h-svh justify-center gap-12 max-md:gap-10">
            <li class="cursor-pointer">Features</li>
            <li class="cursor-pointer">About us</li>
            <li class="cursor-pointer">Blog</li>
            <li
              class="cursor-pointer md:ml-2 md:rounded-xl md:px-4 md:py-2 md:bg-gray-200">
              Log in
            </li>
          </ul>
        </div>
        <span
          id="ham-btn"
          class="z-10 group bg-gray-200 rounded-xl h-10 w-10 flex flex-col justify-center items-center gap-2 md:hidden">
          <span class="w-6 h-0.5 transition-all group-[.clicked]:rotate-[-45deg] group-[.clicked]:translate-y-0.5 bg-black inline-block"></span>
          <span class="w-6 h-0.5 transition-all group-[.clicked]:rotate-45 bg-black inline-block"></span>
        </span>
      </nav>
    </header>
    <main class="px-6 max-w-[1400px] m-auto">
      <section class="py-3">
        <div class="space-y-8 md:translate-y-16">
          <h1 class="md:text-6xl text-4xl font-medium max-md:text-center md:w-4/6">
            A powerful solution to grow your startup. Fast!
          </h1>
          <p class="md:text-xl text-lg max-md:text-center md:w-2/5">
            Organise, collaborate, and track progress seamlessly with our
            one-stop-shop startup growth tool.
          </p>
          <div class="flex flex-col gap-4 md:flex-row">
            <button
              class="bg-blue-500 hover:bg-blue-500/80 hover:cursor-pointer h-fit px-8 text-white py-4 rounded-xl">
              Get started
            </button>
            <button class="bg-gray-200 hover:bg-gray-200/80 hover:cursor-pointer h-fit px-8 py-4 rounded-xl">
              Book a demo
            </button>
          </div>
        </div>
        <picture>
          <source
            media="(min-width:768px)"
            srcset="./assets/hero-section.png"/>
          <img src="./assets/hero-section-mobile.png" class="w-full" alt="" />
        </picture>
      </section>

      <section></section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
